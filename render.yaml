services:
  - type: web
    name: guyt-help-portal
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    disks:
      - name: portal-data
        mountPath: /var/data
        sizeGB: 1
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DB_PATH
        value: /var/data/requests.db
